name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json $PACKAGE_VERSION"
            exit 1
          fi

      - name: Generate release manifest
        run: node scripts/generate-release-manifest.mjs --tag "$GITHUB_REF_NAME" --git-commit "$GITHUB_SHA"

      - name: Build web app
        run: npm run build

      - name: Create GitHub draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            cabinet-release.json

  publish-cabinetai:
    runs-on: ubuntu-latest
    needs: release-assets
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: cabinetai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # OIDC trusted-publishing *auth* requires npm >= 11.5.1; Node 22 ships
      # npm 10.x (which only does OIDC provenance, not auth → unauthenticated
      # PUT → 404). Upgrade before publishing.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # Auth via npm trusted publishing (OIDC). Requires the cabinetai package
      # on npmjs.com to have this repo + workflow registered as a trusted
      # publisher. No NPM_TOKEN secret needed.
      - name: Publish cabinetai
        run: npm publish --access public --provenance

  publish-cli:
    runs-on: ubuntu-latest
    needs: publish-cabinetai
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # OIDC trusted-publishing auth requires npm >= 11.5.1 (see publish-cabinetai).
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      # Auth via npm trusted publishing (OIDC). Same setup as cabinetai.
      - name: Publish create-cabinet
        run: npm publish --access public --provenance
